<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>静墨 - 极简博客</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="loader" id="loader">
        <div class="loader-text">
            <span class="letter">静</span>
            <span class="letter">墨</span>
        </div>
        <div class="loader-line"></div>
    </div>

    <nav class="nav">
        <div class="nav-content">
            <a href="#" class="logo">静墨</a>
            <div class="nav-links">
                <a href="#articles" class="nav-link">文章</a>
                <a href="#about" class="nav-link">关于</a>
                <a href="#contact" class="nav-link">联系</a>
            </div>
        </div>
    </nav>

    <main class="main">
        <section class="hero">
            <div class="hero-content">
                <h1 class="hero-title">
                    <span class="line">
                        <span class="word">记录</span>
                    </span>
                    <span class="line">
                        <span class="word">思考</span>
                    </span>
                    <span class="line">
                        <span class="word">沉淀</span>
                    </span>
                </h1>
                <p class="hero-subtitle">在纷繁中寻找宁静，在文字里雕刻时光</p>
                <div class="scroll-indicator">
                    <div class="scroll-text">向下探索</div>
                    <div class="scroll-line"></div>
                </div>
            </div>
            <div class="hero-decoration">
                <div class="floating-shape shape-1"></div>
                <div class="floating-shape shape-2"></div>
                <div class="floating-shape shape-3"></div>
            </div>
        </section>

        <section id="articles" class="articles">
            <div class="section-header">
                <span class="section-tag">01</span>
                <h2 class="section-title">精选文章</h2>
            </div>

            <div class="articles-filters">
                <div class="search-box">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" class="search-icon">
                        <circle cx="11" cy="11" r="8"/>
                        <path d="m21 21-4.35-4.35"/>
                    </svg>
                    <input type="text" id="searchInput" placeholder="搜索文章..." class="search-input">
                </div>
                <div class="filter-buttons" id="filterButtons">
                    <button class="filter-btn active" data-category="">全部</button>
                    <button class="filter-btn" data-category="设计">设计</button>
                    <button class="filter-btn" data-category="技术">技术</button>
                    <button class="filter-btn" data-category="生活">生活</button>
                    <button class="filter-btn" data-category="随笔">随笔</button>
                    <button class="filter-btn" data-category="编程">编程</button>
                    <button class="filter-btn" data-category="产品">产品</button>
                    <button class="filter-btn" data-category="读书">读书</button>
                </div>
            </div>
            
            <div class="articles-grid" id="articlesGrid">
            </div>

            <div class="more-articles">
                <button class="btn-outline" id="loadMoreBtn" style="display: none;">
                    <span class="btn-text">加载更多</span>
                    <span class="btn-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M5 12h14M12 5l7 7-7 7"/>
                        </svg>
                    </span>
                </button>
            </div>
        </section>

        <section id="about" class="about">
            <div class="about-content">
                <div class="about-text">
                    <span class="section-tag">02</span>
                    <h2 class="section-title">关于我</h2>
                    <p class="about-description">
                        一个热爱文字与设计的创作者。在这个快节奏的时代，
                        选择用最简单的方式记录思考，用最纯粹的形式表达观点。
                    </p>
                    <p class="about-description">
                        相信好的设计是隐形的，而好的文字则是有力的。
                        致力于在极简中寻找深度，在克制中追求表达。
                    </p>
                    <div class="about-stats">
                        <div class="stat">
                            <span class="stat-number" id="statArticles">0</span>
                            <span class="stat-label">篇文章</span>
                        </div>
                        <div class="stat">
                            <span class="stat-number">365</span>
                            <span class="stat-label">天写作</span>
                        </div>
                        <div class="stat">
                            <span class="stat-number">∞</span>
                            <span class="stat-label">位读者</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="contact" class="contact">
            <div class="contact-content">
                <span class="section-tag">03</span>
                <h2 class="section-title">保持联系</h2>
                <p class="contact-description">
                    如果你有任何想法或建议，欢迎与我交流。
                </p>
                <form class="contact-form" id="contactForm">
                    <div class="form-group">
                        <input type="text" class="form-input" placeholder=" " required>
                        <label class="form-label">你的名字</label>
                    </div>
                    <div class="form-group">
                        <input type="email" class="form-input" placeholder=" " required>
                        <label class="form-label">邮箱地址</label>
                    </div>
                    <div class="form-group">
                        <textarea class="form-input form-textarea" placeholder=" " required></textarea>
                        <label class="form-label">你的留言</label>
                    </div>
                    <button type="submit" class="btn-submit">
                        <span class="btn-text">发送消息</span>
                    </button>
                </form>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <div class="footer-text">
                <p>© 2024 静墨. 用心书写每一刻。</p>
            </div>
            <div class="footer-links">
                <a href="https://github.com/Mar14z/blog" class="footer-link" target="_blank">GitHub</a>
                <a href="#" class="footer-link">RSS</a>
            </div>
        </div>
    </footer>

    <div class="toast" id="toast">
        <span class="toast-message"></span>
    </div>

    <script src="script.js"></script>
</body>
</html>
