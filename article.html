<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>文章详情 - 静墨</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .loader { display: none !important; }
        .cursor, .cursor-follower { display: none !important; }

        .article-detail {
            max-width: 800px;
            margin: 0 auto;
            padding: 100px 24px 64px;
        }

        .article-header {
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: var(--border-width) solid var(--color-border);
        }

        .article-category {
            display: inline-block;
            font-family: var(--pixel-font);
            font-size: 0.5rem;
            color: var(--color-secondary);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 16px;
            padding: 4px 12px;
            border: 2px solid var(--color-secondary);
        }

        .article-title {
            font-family: var(--pixel-font);
            font-size: clamp(1rem, 3vw, 1.5rem);
            line-height: 1.8;
            margin-bottom: 24px;
            color: var(--color-text);
            opacity: 0;
            transform: translateY(20px);
            animation: pixel-reveal 0.5s ease-out forwards;
        }

        .article-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            font-family: var(--retro-font);
            font-size: 1.125rem;
            color: var(--color-text-dim);
            opacity: 0;
            animation: fade-in 0.5s ease-out 0.2s forwards;
        }

        .article-meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .article-meta-item svg {
            width: 16px;
            height: 16px;
            stroke: var(--color-primary);
        }

        .article-cover {
            width: 100%;
            margin: 32px 0;
            border: var(--border-width) solid var(--color-border);
            opacity: 0;
            animation: fade-in 0.5s ease-out 0.4s forwards;
        }

        .article-cover img {
            width: 100%;
            height: auto;
            display: block;
        }

        .article-content {
            font-family: var(--retro-font);
            font-size: 1.25rem;
            line-height: 1.8;
            color: var(--color-text);
            opacity: 0;
            animation: fade-in 0.5s ease-out 0.6s forwards;
        }

        .article-content p {
            margin-bottom: 24px;
        }

        .article-content h2 {
            font-family: var(--pixel-font);
            font-size: 0.75rem;
            margin: 48px 0 24px;
            color: var(--color-primary);
            padding-left: 16px;
            border-left: 4px solid var(--color-primary);
        }

        .article-content h3 {
            font-family: var(--pixel-font);
            font-size: 0.625rem;
            margin: 32px 0 16px;
            color: var(--color-text);
        }

        .article-content ul, .article-content ol {
            margin: 24px 0;
            padding-left: 24px;
        }

        .article-content li {
            margin-bottom: 8px;
            list-style-type: square;
        }

        .article-content blockquote {
            border-left: 4px solid var(--color-tertiary);
            padding: 16px 24px;
            margin: 32px 0;
            background: var(--color-bg-alt);
            font-style: italic;
            color: var(--color-text-dim);
        }

        .article-content pre {
            background: var(--color-bg-alt);
            padding: 16px;
            margin: 24px 0;
            border: 2px solid var(--color-border);
            overflow-x: auto;
            font-size: 1rem;
        }

        .article-content code {
            font-family: var(--retro-font);
            background: var(--color-bg-alt);
            padding: 2px 8px;
            border: 1px solid var(--color-border);
            font-size: 1rem;
        }

        .article-content pre code {
            background: none;
            padding: 0;
            border: none;
        }

        .article-footer {
            margin-top: 64px;
            padding-top: 32px;
            border-top: var(--border-width) solid var(--color-border);
        }

        .article-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 24px;
        }

        .article-tag {
            font-family: var(--pixel-font);
            font-size: 0.5rem;
            padding: 8px 16px;
            background: transparent;
            border: 2px solid var(--color-border);
            color: var(--color-text-dim);
            text-decoration: none;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .article-tag:hover {
            border-color: var(--color-primary);
            color: var(--color-primary);
            background: rgba(0, 255, 136, 0.1);
        }

        .article-share {
            display: flex;
            gap: 12px;
        }

        .share-btn {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--color-border);
            background: transparent;
            cursor: pointer;
            transition: all 0.2s;
        }

        .share-btn svg {
            width: 18px;
            height: 18px;
            stroke: var(--color-text-dim);
            transition: stroke 0.2s;
        }

        .share-btn:hover {
            border-color: var(--color-primary);
            background: rgba(0, 255, 136, 0.1);
        }

        .share-btn:hover svg {
            stroke: var(--color-primary);
        }

        .article-nav {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-top: 48px;
        }

        .article-nav-item {
            padding: 20px;
            background: var(--color-bg-card);
            border: 2px solid var(--color-border);
            text-decoration: none;
            transition: all 0.2s;
        }

        .article-nav-item:hover {
            border-color: var(--color-primary);
            transform: translate(-4px, -4px);
            box-shadow: 4px 4px 0 var(--color-primary);
        }

        .article-nav-label {
            font-family: var(--pixel-font);
            font-size: 0.5rem;
            color: var(--color-text-dim);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .article-nav-title {
            font-family: var(--retro-font);
            font-size: 1.125rem;
            color: var(--color-text);
            line-height: 1.4;
        }

        .article-nav-item.next {
            text-align: right;
        }

        @media (max-width: 640px) {
            .article-detail {
                padding: 80px 16px 48px;
            }

            .article-meta {
                gap: 16px;
            }

            .article-nav {
                grid-template-columns: 1fr;
            }

            .article-nav-item.next {
                text-align: left;
            }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-content">
            <a href="index.html" class="logo">静墨</a>
            <div class="nav-links">
                <a href="index.html#articles" class="nav-link">文章</a>
                <a href="index.html#about" class="nav-link">关于</a>
                <a href="index.html#contact" class="nav-link">联系</a>
            </div>
        </div>
    </nav>

    <main class="main">
        <article class="article-detail" id="articleDetail">
            <header class="article-header">
                <div class="article-category" id="articleCategory">分类</div>
                <h1 class="article-title" id="articleTitle">文章标题</h1>
                <div class="article-meta">
                    <div class="article-meta-item">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <rect x="3" y="4" width="18" height="18" rx="2"/>
                            <line x1="16" y1="2" x2="16" y2="6"/>
                            <line x1="8" y1="2" x2="8" y2="6"/>
                            <line x1="3" y1="10" x2="21" y2="10"/>
                        </svg>
                        <span id="articleDate">2024年1月1日</span>
                    </div>
                    <div class="article-meta-item">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <circle cx="12" cy="12" r="10"/>
                            <polyline points="12,6 12,12 16,14"/>
                        </svg>
                        <span id="articleReadTime">5 分钟</span>
                    </div>
                    <div class="article-meta-item">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                        <span id="articleViews">0 次阅读</span>
                    </div>
                </div>
            </header>

            <div class="article-cover" id="articleCover">
            </div>

            <div class="article-content" id="articleContent">
                <p>正在加载文章内容...</p>
            </div>

            <div class="article-footer">
                <div class="article-tags" id="articleTags">
                </div>

                <div class="article-share">
                    <button class="share-btn" title="分享到微博" onclick="shareToWeibo()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <circle cx="12" cy="12" r="10"/>
                            <path d="M16 8c0 2.2-1.8 4-4 4s-4-1.8-4-4 1.8-4 4-4c.7 0 1.4.2 2 .5"/>
                            <path d="M8 16c.5 1.5 1.5 3 4 3s3.5-1.5 4-3"/>
                        </svg>
                    </button>
                    <button class="share-btn" title="复制链接" onclick="copyLink()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
                            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
                        </svg>
                    </button>
                </div>

                <nav class="article-nav" id="articleNav">
                    <a href="#" class="article-nav-item prev" id="prevArticle">
                        <div class="article-nav-label">← 上一篇</div>
                        <div class="article-nav-title" id="prevTitle">加载中...</div>
                    </a>
                    <a href="#" class="article-nav-item next" id="nextArticle">
                        <div class="article-nav-label">下一篇 →</div>
                        <div class="article-nav-title" id="nextTitle">加载中...</div>
                    </a>
                </nav>
            </div>
        </article>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <div class="footer-text">
                <p>© 2024 静墨. 用心书写每一刻。</p>
            </div>
            <div class="footer-links">
                <a href="https://github.com/Mar14z/blog" class="footer-link" target="_blank">GitHub</a>
                <a href="#" class="footer-link">RSS</a>
            </div>
        </div>
    </footer>

    <div class="toast" id="toast">
        <span class="toast-message"></span>
    </div>

    <script src="article-detail.js"></script>
</body>
</html>
