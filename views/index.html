<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>静墨 - 记录 · 思考 · 沉淀</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Press+Start+2P&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/public/css/variables.css">
    <link rel="stylesheet" href="/public/css/base.css">
    <link rel="stylesheet" href="/public/css/components.css">
    <link rel="stylesheet" href="/public/css/pages.css">
    <style>
        .hero {
            position: relative;
            background: radial-gradient(ellipse at center, var(--bg-secondary) 0%, var(--bg-primary) 70%);
            overflow: hidden;
        }

        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .hero-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        .floating-letters {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .floating-letter {
            position: absolute;
            font-family: var(--font-mono);
            color: rgba(80, 80, 80, 0.15);
            animation: float 10s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.3; }
            50% { transform: translateY(-20px) rotate(5deg); opacity: 0.6; }
        }

        .hero-content {
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .hero-title {
            font-family: var(--font-pixel);
            font-size: clamp(1.5rem, 4vw, 3rem);
            line-height: 2;
            margin-bottom: 40px;
            opacity: 0;
            animation: titleReveal 1s var(--transition-smooth) 0.5s forwards;
        }

        .hero-title span {
            display: inline-block;
        }

        @keyframes titleReveal {
            to {
                opacity: 1;
            }
        }

        .hero-subtitle {
            font-family: var(--font-sans);
            font-size: 1.25rem;
            color: var(--text-secondary);
            font-weight: 300;
            opacity: 0;
            animation: fadeIn 1s var(--transition-smooth) 1s forwards;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        .scroll-hint {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            opacity: 0;
            animation: fadeIn 1s var(--transition-smooth) 1.5s forwards;
        }

        .scroll-hint-text {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .scroll-hint-line {
            width: 1px;
            height: 60px;
            background: linear-gradient(to bottom, var(--text-dim), transparent);
            animation: scrollPulse 2s ease-in-out infinite;
        }

        @keyframes scrollPulse {
            0%, 100% {
                opacity: 1;
                transform: scaleY(1);
            }
            50% {
                opacity: 0.5;
                transform: scaleY(0.8);
            }
        }

        .articles-section {
            background: var(--bg-primary);
            padding: 100px 40px;
        }

        .filters {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            margin-bottom: 48px;
        }

        .search-box {
            position: relative;
            width: 100%;
            max-width: 400px;
        }

        .search-input {
            width: 100%;
            padding: 16px 20px 16px 48px;
            font-family: var(--font-mono);
            font-size: 1rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            outline: none;
            transition: all 0.3s var(--transition-smooth);
        }

        .search-input:focus {
            border-color: var(--text-secondary);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            stroke: var(--text-dim);
        }

        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
        }

        .filter-btn {
            font-family: var(--font-mono);
            font-size: 0.875rem;
            padding: 10px 20px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s var(--transition-smooth);
        }

        .filter-btn:hover,
        .filter-btn.active {
            border-color: var(--text-primary);
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.05);
        }

        .articles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: var(--card-gap);
            max-width: 1200px;
            margin: 0 auto;
        }

        .article-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            transition: all 0.4s var(--transition-smooth);
            cursor: pointer;
            opacity: 0;
            transform: translateY(30px);
            overflow: hidden;
        }

        .article-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .article-card:hover {
            border-color: var(--text-secondary);
            transform: translateY(-6px);
            box-shadow: 0 15px 40px rgba(255, 255, 255, 0.05);
        }

        .article-card-cover {
            height: 160px;
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .article-card-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .article-card:hover .article-card-cover img {
            transform: scale(1.05);
        }

        .article-card-cover-placeholder {
            font-family: var(--font-pixel);
            font-size: 2rem;
            color: var(--text-dim);
            opacity: 0.3;
        }

        .article-card-content {
            padding: 24px;
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .card-date {
            font-size: 0.875rem;
            color: var(--text-dim);
            font-family: var(--font-mono);
        }

        .card-tag {
            font-family: var(--font-pixel);
            font-size: 0.5rem;
            padding: 4px 12px;
            border: 1px solid var(--text-dim);
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        .card-title {
            font-family: var(--font-pixel);
            font-size: 0.75rem;
            line-height: 1.8;
            margin-bottom: 16px;
            color: var(--text-primary);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-excerpt {
            font-size: 0.9375rem;
            color: var(--text-secondary);
            margin-bottom: 20px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.7;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .read-time {
            font-size: 0.875rem;
            color: var(--text-dim);
            font-family: var(--font-mono);
        }

        .card-arrow {
            width: 36px;
            height: 36px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s var(--transition-smooth);
        }

        .card-arrow svg {
            width: 16px;
            height: 16px;
            stroke: var(--text-dim);
            transition: stroke 0.3s;
        }

        .article-card:hover .card-arrow {
            border-color: var(--text-primary);
            background: var(--text-primary);
        }

        .article-card:hover .card-arrow svg {
            stroke: var(--bg-primary);
        }

        .about-section {
            background: var(--bg-secondary);
            text-align: center;
        }

        .about-content {
            max-width: 700px;
        }

        .about-description {
            font-size: 1.125rem;
            color: var(--text-secondary);
            margin-bottom: 20px;
            line-height: 1.9;
            font-weight: 300;
        }

        .about-stats {
            display: flex;
            justify-content: center;
            gap: 60px;
            margin-top: 60px;
        }

        .stat {
            text-align: center;
        }

        .stat-number {
            font-family: var(--font-pixel);
            font-size: 1.5rem;
            color: var(--text-primary);
            display: block;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 0.875rem;
            color: var(--text-dim);
        }

        .about-cta {
            margin-top: 48px;
        }

        .contact-section {
            background: var(--bg-primary);
        }

        .contact-content {
            width: 100%;
            max-width: 500px;
        }

        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .form-group {
            position: relative;
        }

        .form-input {
            width: 100%;
            padding: 16px 0;
            font-family: var(--font-mono);
            font-size: 1rem;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
            color: var(--text-primary);
            outline: none;
            transition: all 0.3s var(--transition-smooth);
        }

        .form-input:focus {
            border-color: var(--text-primary);
        }

        .form-label {
            position: absolute;
            left: 0;
            top: 16px;
            font-size: 1rem;
            color: var(--text-dim);
            pointer-events: none;
            transition: all 0.3s var(--transition-smooth);
        }

        .form-input:focus + .form-label,
        .form-input:not(:placeholder-shown) + .form-label {
            top: -8px;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .form-textarea {
            min-height: 120px;
            resize: vertical;
        }

        .btn-submit {
            font-family: var(--font-pixel);
            font-size: 0.75rem;
            padding: 20px 40px;
            background: var(--text-primary);
            border: none;
            color: var(--bg-primary);
            cursor: pointer;
            transition: all 0.3s var(--transition-smooth);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 20px;
            align-self: center;
        }

        .btn-submit:hover {
            background: transparent;
            color: var(--text-primary);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 768px) {
            .hero-title {
                font-size: 1.25rem;
            }
            
            .hero-subtitle {
                font-size: 1rem;
            }
            
            .articles-section {
                padding: 60px 20px;
            }
            
            .articles-grid {
                grid-template-columns: 1fr;
            }
            
            .about-stats {
                flex-direction: column;
                gap: 30px;
            }

            .article-card-cover {
                height: 140px;
            }
        }
    </style>
</head>
<body>
    <div class="nav-progress" id="navProgress"></div>

    <div class="loader" id="loader">
        <div class="loader-text">静墨</div>
        <div class="loader-line"></div>
    </div>

    <nav class="nav" id="nav">
        <a href="/" class="logo">静墨</a>
        <div class="nav-links">
            <a href="#articles" class="nav-link">文章</a>
            <a href="/about" class="nav-link">介绍</a>
            <a href="/portfolio" class="nav-link">作品</a>
            <a href="/links" class="nav-link">友链</a>
            <a href="#contact-section" class="nav-link">联系</a>
        </div>
    </nav>

    <main class="main" id="main">
        <section class="section hero" id="hero">
            <div class="hero-bg">
                <div class="hero-grid"></div>
                <div class="floating-letters" id="floatingLetters"></div>
            </div>
            <div class="hero-content">
                <h1 class="hero-title" id="heroTitle">
                    <span>记</span><span>录</span><span>.</span><span>思</span><span>考</span><span>.</span><span>沉</span><span>淀</span>
                </h1>
                <p class="hero-subtitle">在纷繁中寻找宁静，在文字里雕刻时光</p>
            </div>
            <div class="scroll-hint">
                <span class="scroll-hint-text">Scroll</span>
                <div class="scroll-hint-line"></div>
            </div>
        </section>

        <section class="section articles-section" id="articles">
            <div class="section-header">
                <div class="section-tag">01</div>
                <h2 class="section-title">精选文章</h2>
            </div>

            <div class="filters">
                <div class="search-box">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <circle cx="11" cy="11" r="8"/>
                        <path d="m21 21-4.35-4.35"/>
                    </svg>
                    <input type="text" id="searchInput" class="search-input" placeholder="搜索文章...">
                </div>
                <div class="filter-buttons" id="filterButtons">
                    <button class="filter-btn active" data-category="">全部</button>
                    <button class="filter-btn" data-category="编程">编程</button>
                    <button class="filter-btn" data-category="产品">产品</button>
                    <button class="filter-btn" data-category="读书">读书</button>
                    <button class="filter-btn" data-category="随笔">随笔</button>
                </div>
            </div>

            <div class="articles-grid" id="articlesGrid">
            </div>
        </section>

        <section class="section about-section" id="about-section">
            <div class="about-content">
                <div class="section-tag">02</div>
                <h2 class="section-title">关于</h2>
                <p class="about-description">
                    一个热爱文字与设计的创作者。在这个快节奏的时代，
                    选择用最简单的方式记录思考，用最纯粹的形式表达观点。
                </p>
                <p class="about-description">
                    相信好的设计是隐形的，而好的文字则是有力的。
                    致力于在极简中寻找深度，在克制中追求表达。
                </p>
                <div class="about-stats">
                    <div class="stat">
                        <span class="stat-number" id="statArticles">0</span>
                        <span class="stat-label">篇文章</span>
                    </div>
                    <div class="stat">
                        <span class="stat-number">365</span>
                        <span class="stat-label">天写作</span>
                    </div>
                    <div class="stat">
                        <span class="stat-number">∞</span>
                        <span class="stat-label">位读者</span>
                    </div>
                </div>
                <div class="about-cta">
                    <a href="/about" class="btn-submit" style="text-decoration: none; display: inline-block;">了解更多</a>
                </div>
            </div>
        </section>

        <section class="section contact-section" id="contact-section">
            <div class="contact-content">
                <div class="section-tag">03</div>
                <h2 class="section-title">联系</h2>
                <form class="contact-form" id="contactForm">
                    <div class="form-group">
                        <input type="text" class="form-input" id="contactName" placeholder=" " required>
                        <label class="form-label">名字</label>
                    </div>
                    <div class="form-group">
                        <input type="email" class="form-input" id="contactEmail" placeholder=" " required>
                        <label class="form-label">邮箱</label>
                    </div>
                    <div class="form-group">
                        <textarea class="form-input form-textarea" id="contactMessage" placeholder=" " required></textarea>
                        <label class="form-label">留言</label>
                    </div>
                    <button type="submit" class="btn-submit">发送</button>
                </form>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="footer-text">© 2024 静墨</div>
        <div class="footer-links">
            <a href="https://github.com/Mar14z/blog" class="footer-link" target="_blank">GitHub</a>
            <a href="/links" class="footer-link">友链</a>
        </div>
    </footer>

    <div class="toast" id="toast">
        <span class="toast-message"></span>
    </div>

    <script src="/public/js/app.js"></script>
</body>
</html>
