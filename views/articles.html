<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="文章列表 - 静墨博客的所有文章">
    <meta property="og:title" content="文章 - 静墨">
    <meta property="og:description" content="文章列表 - 静墨博客的所有文章">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://jingmo.dev/articles">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="文章 - 静墨">
    <link rel="canonical" href="https://jingmo.dev/articles">
    <title>文章 - 静墨</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/components.css">
    <style>
        body {
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        .articles-page {
            padding: 120px 4rem 4rem;
            max-width: 1400px;
            margin: 0 auto;
            min-height: 100vh;
        }

        .page-header {
            margin-bottom: 4rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--border);
        }

        .page-number {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--accent);
            letter-spacing: 4px;
            margin-bottom: 1rem;
            text-transform: uppercase;
        }

        .page-title {
            font-family: var(--font-sans);
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 900;
            letter-spacing: -0.03em;
            line-height: 1.1;
            margin-bottom: 1rem;
        }

        .page-desc {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--text-muted);
            letter-spacing: 1px;
            max-width: 500px;
        }

        .articles-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .filter-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .filter-btn {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            padding: 0.5rem 1rem;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: var(--text-primary);
            border-color: var(--text-primary);
            color: var(--bg-primary);
        }

        .search-box {
            position: relative;
        }

        .search-input {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            padding: 0.5rem 1rem 0.5rem 2.5rem;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-primary);
            outline: none;
            letter-spacing: 1px;
            width: 240px;
            transition: all 0.3s ease;
        }

        .search-input::placeholder {
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .search-input:focus {
            border-color: var(--accent);
        }

        .search-icon {
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            width: 14px;
            height: 14px;
            stroke: var(--text-dim);
        }

        .article-count {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            color: var(--text-dim);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .articles-list {
            border-top: 1px solid var(--border);
        }

        .article-row {
            display: grid;
            grid-template-columns: 60px 1fr 120px 80px;
            align-items: center;
            gap: 2rem;
            padding: 1.75rem 0;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.3s ease;
            opacity: 0;
            transform: translateY(20px);
        }

        .article-row.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .article-row:hover {
            padding-left: 1rem;
            background: linear-gradient(90deg, var(--bg-secondary), transparent);
        }

        .article-row:hover .row-title {
            color: var(--accent);
        }

        .article-row:hover .row-arrow {
            transform: translateX(4px);
            color: var(--accent);
        }

        .row-index {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--text-dim);
            letter-spacing: 1px;
        }

        .row-content {
            min-width: 0;
        }

        .row-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 0.35rem;
            line-height: 1.3;
            transition: color 0.3s ease;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .row-excerpt {
            font-size: 0.8rem;
            color: var(--text-muted);
            line-height: 1.5;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .row-category {
            font-family: var(--font-mono);
            font-size: 0.6rem;
            padding: 0.25rem 0.5rem;
            border: 1px solid var(--accent);
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
            justify-self: center;
        }

        .row-meta {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.25rem;
        }

        .row-date {
            font-family: var(--font-mono);
            font-size: 0.6rem;
            color: var(--text-dim);
            letter-spacing: 1px;
        }

        .row-arrow {
            font-family: var(--font-mono);
            font-size: 0.9rem;
            color: var(--text-dim);
            transition: all 0.3s ease;
        }

        .empty-state {
            padding: 6rem 2rem;
            text-align: center;
        }

        .empty-text {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--text-dim);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .load-more {
            display: flex;
            justify-content: center;
            padding: 3rem 0;
        }

        .load-more-btn {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            padding: 0.75rem 2rem;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .load-more-btn:hover {
            background: var(--text-primary);
            border-color: var(--text-primary);
            color: var(--bg-primary);
        }

        @media (max-width: 1024px) {
            .article-row {
                grid-template-columns: 40px 1fr 80px;
            }

            .row-category {
                display: none;
            }
        }

        @media (max-width: 768px) {
            .articles-page {
                padding: 100px 1.5rem 2rem;
            }

            .article-row {
                grid-template-columns: 1fr;
                gap: 0.5rem;
                padding: 1.25rem 0;
            }

            .row-index {
                display: none;
            }

            .row-meta {
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
            }

            .articles-toolbar {
                flex-direction: column;
                align-items: stretch;
            }

            .search-input {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <nav class="nav" id="nav" aria-label="主导航">
        <div class="nav-left">
            <a href="/" class="logo">静</a>
        </div>
        <div class="nav-links">
            <a href="/" class="nav-link">首页</a>
            <a href="/articles" class="nav-link active" aria-current="page">文章</a>
            <a href="/about" class="nav-link">关于</a>
            <a href="/gallery" class="nav-link">相册</a>
            <a href="/portfolio" class="nav-link">作品</a>
            <a href="/links" class="nav-link">友链</a>
        </div>
    </nav>

    <main class="articles-page">
        <header class="page-header">
            <div class="page-number">02 / 文章</div>
            <h1 class="page-title">全部文章</h1>
            <p class="page-desc">记录技术思考、产品感悟与生活点滴</p>
        </header>

        <div class="articles-toolbar">
            <div class="filter-group">
                <button class="filter-btn active" data-category="">全部</button>
                <button class="filter-btn" data-category="编程">编程</button>
                <button class="filter-btn" data-category="产品">产品</button>
                <button class="filter-btn" data-category="读书">读书</button>
                <button class="filter-btn" data-category="设计">设计</button>
                <button class="filter-btn" data-category="生活">生活</button>
            </div>
            <div class="search-box">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
                </svg>
                <input type="text" class="search-input" id="searchInput" placeholder="搜索文章...">
            </div>
        </div>

        <div class="article-count" id="articleCount"></div>

        <div class="articles-list" id="articlesList"></div>

        <div class="load-more" id="loadMore" style="display:none;">
            <button class="load-more-btn" id="loadMoreBtn">加载更多</button>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-text">© 2024 静墨</div>
        <div class="footer-links">
            <a href="https://github.com/Mar14z/blog" class="footer-link" target="_blank" rel="noopener noreferrer">GitHub</a>
            <a href="/links" class="footer-link">友链</a>
        </div>
    </footer>

    <div class="toast" id="toast">
        <span class="toast-message"></span>
    </div>

    <script src="/js/utils.js"></script>
    <script>
        class ArticlesPage {
            constructor() {
                this.articles = [];
                this.filteredArticles = [];
                this.currentCategory = '';
                this.searchQuery = '';
                this.pageSize = 15;
                this.currentPage = 1;
                this.scrollObserver = null;
                this.init();
            }

            init() {
                this.initFilters();
                this.initSearch();
                this.loadArticles();
            }

            initFilters() {
                const filterButtons = document.querySelectorAll('.filter-btn');
                filterButtons.forEach(btn => {
                    btn.addEventListener('click', () => {
                        filterButtons.forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        this.currentCategory = btn.dataset.category;
                        this.currentPage = 1;
                        this.applyFilters();
                    });
                });
            }

            initSearch() {
                const searchInput = document.getElementById('searchInput');
                const handleSearch = debounce(() => {
                    this.searchQuery = searchInput.value.trim().toLowerCase();
                    this.currentPage = 1;
                    this.applyFilters();
                }, 300);
                searchInput.addEventListener('input', handleSearch);
            }

            applyFilters() {
                this.filteredArticles = this.articles.filter(article => {
                    const matchesCategory = !this.currentCategory || article.category === this.currentCategory;
                    const matchesSearch = !this.searchQuery ||
                        article.title.toLowerCase().includes(this.searchQuery) ||
                        (article.excerpt && article.excerpt.toLowerCase().includes(this.searchQuery)) ||
                        (article.tags && article.tags.some(tag => tag.toLowerCase().includes(this.searchQuery)));
                    return matchesCategory && matchesSearch;
                });
                this.renderArticles();
            }

            async loadArticles() {
                try {
                    const response = await fetch(`${API_BASE}/articles?limit=200&t=${Date.now()}`);
                    const data = await response.json();
                    if (data.code === 200) {
                        this.articles = data.data.articles || data.data;
                        this.filteredArticles = this.articles;
                        this.renderArticles();
                    }
                } catch (error) {
                    console.error('加载文章失败:', error);
                    this.renderEmpty();
                }
            }

            renderArticles() {
                const list = document.getElementById('articlesList');
                const countEl = document.getElementById('articleCount');
                const loadMore = document.getElementById('loadMore');

                if (!list) return;

                const total = this.filteredArticles.length;
                const showing = Math.min(this.pageSize * this.currentPage, total);

                countEl.textContent = `${showing} / ${total} 篇`;

                if (total === 0) {
                    this.renderEmpty();
                    loadMore.style.display = 'none';
                    return;
                }

                const visibleArticles = this.filteredArticles.slice(0, showing);

                list.innerHTML = visibleArticles.map((article, index) => `
                    <div class="article-row" onclick="window.location.href='/article?slug=${article.slug}'">
                        <span class="row-index">${String(index + 1).padStart(2, '0')}</span>
                        <div class="row-content">
                            <div class="row-title">${article.title}</div>
                            <div class="row-excerpt">${article.excerpt || ''}</div>
                        </div>
                        <span class="row-category">${article.category}</span>
                        <div class="row-meta">
                            <span class="row-date">${formatDate(article.publishedAt || article.createdAt)}</span>
                            <span class="row-arrow">→</span>
                        </div>
                    </div>
                `).join('');

                if (showing < total) {
                    loadMore.style.display = 'flex';
                    document.getElementById('loadMoreBtn').onclick = () => {
                        this.currentPage++;
                        this.renderArticles();
                    };
                } else {
                    loadMore.style.display = 'none';
                }

                this.initObserver();
            }

            renderEmpty() {
                const list = document.getElementById('articlesList');
                const countEl = document.getElementById('articleCount');
                countEl.textContent = '0 / 0 篇';
                list.innerHTML = `
                    <div class="empty-state">
                        <p class="empty-text">暂无文章</p>
                    </div>
                `;
            }

            initObserver() {
                if (this.scrollObserver) {
                    this.scrollObserver.disconnect();
                }
                this.scrollObserver = createScrollObserver((target) => {
                    target.classList.add('visible');
                }, { threshold: 0.05 });
                document.querySelectorAll('.article-row').forEach(row => {
                    this.scrollObserver.observe(row);
                });
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new ArticlesPage();
        });
    </script>
</body>
</html>
