<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>文章详情 - 静墨</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Press+Start+2P&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/public/css/variables.css">
    <link rel="stylesheet" href="/public/css/base.css">
    <link rel="stylesheet" href="/public/css/components.css">
    <style>
        .nav-progress { display: none; }
        .loader { display: none !important; }
        
        .reading-progress {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: var(--text-primary);
            z-index: 1002;
            width: 0%;
            transition: width 0.1s linear;
        }
        
        .article-page {
            min-height: 100vh;
            padding: 100px 40px 60px;
            max-width: 800px;
            margin: 0 auto;
        }
        
        .article-header {
            margin-bottom: 48px;
            padding-bottom: 32px;
            border-bottom: 1px solid var(--border);
        }
        
        .article-category {
            display: inline-block;
            font-family: var(--font-pixel);
            font-size: 0.5rem;
            padding: 6px 16px;
            border: 1px solid var(--text-dim);
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 24px;
        }
        
        .article-title {
            font-family: var(--font-pixel);
            font-size: clamp(1rem, 3vw, 1.5rem);
            line-height: 1.8;
            margin-bottom: 24px;
        }
        
        .article-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            font-size: 0.875rem;
            color: var(--text-dim);
        }
        
        .article-meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .article-meta-item svg {
            width: 16px;
            height: 16px;
            stroke: var(--text-dim);
        }
        
        .article-cover {
            width: 100%;
            margin: 32px 0;
            border: 1px solid var(--border);
        }
        
        .article-cover img {
            width: 100%;
            height: auto;
            display: block;
        }
        
        .article-content {
            font-size: 1.0625rem;
            line-height: 2;
            color: var(--text-secondary);
        }
        
        .article-content p {
            margin-bottom: 24px;
        }
        
        .article-content h2 {
            font-family: var(--font-pixel);
            font-size: 0.75rem;
            margin: 48px 0 24px;
            color: var(--text-primary);
            padding-left: 16px;
            border-left: 2px solid var(--text-primary);
        }
        
        .article-content h3 {
            font-family: var(--font-pixel);
            font-size: 0.625rem;
            margin: 32px 0 16px;
            color: var(--text-primary);
        }
        
        .article-content ul, .article-content ol {
            margin: 24px 0;
            padding-left: 24px;
        }
        
        .article-content li {
            margin-bottom: 8px;
            list-style-type: square;
        }
        
        .article-content blockquote {
            border-left: 2px solid var(--text-dim);
            padding: 16px 24px;
            margin: 32px 0;
            font-style: italic;
            color: var(--text-dim);
        }
        
        .article-content pre {
            background: var(--bg-secondary);
            padding: 20px;
            margin: 24px 0;
            border: 1px solid var(--border);
            overflow-x: auto;
            font-size: 0.875rem;
        }
        
        .article-content code {
            font-family: var(--font-mono);
            background: var(--bg-secondary);
            padding: 2px 8px;
            border: 1px solid var(--border);
            font-size: 0.875rem;
        }
        
        .article-content pre code {
            background: none;
            padding: 0;
            border: none;
        }
        
        .article-footer {
            margin-top: 64px;
            padding-top: 32px;
            border-top: 1px solid var(--border);
        }
        
        .article-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 24px;
        }
        
        .article-tag {
            font-size: 0.875rem;
            padding: 6px 16px;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            text-decoration: none;
            transition: all 0.3s;
        }
        
        .article-tag:hover {
            border-color: var(--text-primary);
            color: var(--text-primary);
        }
        
        .article-share {
            display: flex;
            gap: 12px;
        }
        
        .share-btn {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border);
            background: transparent;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .share-btn svg {
            width: 18px;
            height: 18px;
            stroke: var(--text-dim);
            transition: stroke 0.3s;
        }
        
        .share-btn:hover {
            border-color: var(--text-primary);
        }
        
        .share-btn:hover svg {
            stroke: var(--text-primary);
        }
        
        .article-nav {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-top: 48px;
        }
        
        .article-nav-item {
            padding: 24px;
            border: 1px solid var(--border);
            text-decoration: none;
            transition: all 0.3s;
        }
        
        .article-nav-item:hover {
            border-color: var(--text-secondary);
        }
        
        .article-nav-label {
            font-family: var(--font-pixel);
            font-size: 0.5rem;
            color: var(--text-dim);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .article-nav-title {
            font-size: 0.9375rem;
            color: var(--text-primary);
            line-height: 1.5;
        }
        
        .article-nav-item.next {
            text-align: right;
        }
        
        @media (max-width: 640px) {
            .article-page {
                padding: 80px 20px 48px;
            }
            
            .article-meta {
                gap: 16px;
            }
            
            .article-nav {
                grid-template-columns: 1fr;
            }
            
            .article-nav-item.next {
                text-align: left;
            }
        }
    </style>
</head>
<body>
    <div class="reading-progress" id="readingProgress"></div>
    <nav class="nav">
        <a href="/" class="logo">静墨</a>
        <div class="nav-links">
            <a href="/#articles" class="nav-link">文章</a>
            <a href="/about" class="nav-link">介绍</a>
            <a href="/portfolio" class="nav-link">作品</a>
            <a href="/links" class="nav-link">友链</a>
            <a href="/#contact" class="nav-link">联系</a>
        </div>
    </nav>

    <main class="article-page">
        <header class="article-header">
            <div class="article-category" id="articleCategory">分类</div>
            <h1 class="article-title" id="articleTitle">文章标题</h1>
            <div class="article-meta">
                <div class="article-meta-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <rect x="3" y="4" width="18" height="18" rx="2"/>
                        <line x1="16" y1="2" x2="16" y2="6"/>
                        <line x1="8" y1="2" x2="8" y2="6"/>
                        <line x1="3" y1="10" x2="21" y2="10"/>
                    </svg>
                    <span id="articleDate">2024年1月1日</span>
                </div>
                <div class="article-meta-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <circle cx="12" cy="12" r="10"/>
                        <polyline points="12,6 12,12 16,14"/>
                    </svg>
                    <span id="articleReadTime">5 分钟</span>
                </div>
                <div class="article-meta-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                    <span id="articleViews">0 次阅读</span>
                </div>
            </div>
        </header>

        <div class="article-cover" id="articleCover"></div>

        <div class="article-content" id="articleContent">
            <p>正在加载文章内容...</p>
        </div>

        <footer class="article-footer">
            <div class="article-tags" id="articleTags"></div>

            <div class="article-share">
                <button class="share-btn" title="分享到微博" onclick="shareToWeibo()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M16 8c0 2.2-1.8 4-4 4s-4-1.8-4-4 1.8-4 4-4c.7 0 1.4.2 2 .5"/>
                        <path d="M8 16c.5 1.5 1.5 3 4 3s3.5-1.5 4-3"/>
                    </svg>
                </button>
                <button class="share-btn" title="复制链接" onclick="copyLink()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
                        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
                    </svg>
                </button>
            </div>

            <nav class="article-nav">
                <a href="#" class="article-nav-item prev" id="prevArticle">
                    <div class="article-nav-label">← 上一篇</div>
                    <div class="article-nav-title" id="prevTitle">加载中...</div>
                </a>
                <a href="#" class="article-nav-item next" id="nextArticle">
                    <div class="article-nav-label">下一篇 →</div>
                    <div class="article-nav-title" id="nextTitle">加载中...</div>
                </a>
            </nav>
        </footer>
    </main>

    <footer class="footer">
        <div class="footer-text">© 2024 静墨</div>
        <div class="footer-links">
            <a href="https://github.com/Mar14z/blog" class="footer-link" target="_blank">GitHub</a>
            <a href="/links" class="footer-link">友链</a>
        </div>
    </footer>

    <div class="toast" id="toast">
        <span class="toast-message"></span>
    </div>

    <script src="/public/js/article-detail.js"></script>
</body>
</html>
