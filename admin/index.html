<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 静墨</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="admin-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1 class="sidebar-logo">静</h1>
                <span class="sidebar-title">静墨</span>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-page="dashboard">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
                    <span>仪表盘</span>
                </a>
                <a href="#" class="nav-item" data-page="articles">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                    <span>文章管理</span>
                </a>
                <a href="#" class="nav-item" data-page="taxonomy">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                    <span>分类与标签</span>
                </a>
                <a href="#" class="nav-item" data-page="settings">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                    <span>系统设置</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <a href="../" class="nav-item" target="_blank">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15,3 21,3 21,9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                    <span>访问博客</span>
                </a>
                <button class="logout-btn" id="logoutBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    <span>退出登录</span>
                </button>
            </div>
        </aside>

        <main class="main-content">
            <div id="loginPage" class="page">
                <div class="login-card">
                    <div class="login-header">
                        <h2 class="login-logo">静</h2>
                        <h3 class="login-title">管理员登录</h3>
                    </div>
                    <form id="loginForm" class="login-form">
                        <div class="form-group">
                            <input type="text" id="username" name="username" required placeholder=" ">
                            <label for="username">用户名</label>
                        </div>
                        <div class="form-group">
                            <input type="password" id="password" name="password" required placeholder=" ">
                            <label for="password">密码</label>
                        </div>
                        <button type="submit" class="login-btn">
                            <span>登 录</span>
                        </button>
                    </form>
                    <p class="login-hint">默认账户: admin / admin123</p>
                </div>
            </div>

            <div id="dashboardPage" class="page hidden">
                <div class="page-header">
                    <div>
                        <h2>仪表盘</h2>
                        <p class="page-subtitle">欢迎回来，<span id="adminName">管理员</span></p>
                    </div>
                    <div class="header-actions">
                        <button class="btn-secondary" id="exportDataBtn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" style="width:16px;height:16px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                            导出数据
                        </button>
                        <button class="btn-primary" id="newArticleBtn2">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                            写文章
                        </button>
                    </div>
                </div>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-number" id="totalArticles">0</div>
                        <div class="stat-label">文章总数</div>
                        <div class="stat-change positive" id="articlesChange"></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="publishedArticles">0</div>
                        <div class="stat-label">已发布</div>
                        <div class="stat-trend" id="publishedTrend"></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="draftArticles">0</div>
                        <div class="stat-label">草稿</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="totalViews">0</div>
                        <div class="stat-label">总浏览</div>
                        <div class="stat-trend" id="viewsTrend"></div>
                    </div>
                </div>
                <div class="dashboard-grid">
                    <div class="dashboard-card">
                        <div class="card-header">
                            <h3>分类分布</h3>
                            <span class="card-count" id="categoryCount">0 个分类</span>
                        </div>
                        <div class="category-chart" id="categoryChart"></div>
                    </div>
                    <div class="dashboard-card">
                        <div class="card-header">
                            <h3>最近文章</h3>
                            <span class="card-count" id="recentCount">最近 5 篇</span>
                        </div>
                        <div class="recent-articles" id="recentArticles"></div>
                    </div>
                </div>
                <div class="dashboard-grid">
                    <div class="dashboard-card">
                        <div class="card-header">
                            <h3>热门标签</h3>
                        </div>
                        <div class="tag-cloud" id="tagCloud"></div>
                    </div>
                    <div class="dashboard-card">
                        <div class="card-header">
                            <h3>快速操作</h3>
                        </div>
                        <div class="quick-actions">
                            <button class="quick-action" id="quickNewArticle">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
                                新建文章
                            </button>
                            <button class="quick-action" id="quickManageCategories">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                                管理分类
                            </button>
                            <button class="quick-action" id="quickViewSite">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15,3 21,3 21,9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                                访问博客
                            </button>
                            <button class="quick-action" id="quickBackup">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17,8 12,3 7,8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                                备份数据
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="articlesPage" class="page hidden">
                <div class="page-header">
                    <div>
                        <h2>文章管理</h2>
                        <p class="page-subtitle" id="articlesSubtitle">共 <span id="articlesCount">0</span> 篇文章</p>
                    </div>
                    <div class="header-actions">
                        <div class="search-box">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                            <input type="text" id="searchInput" placeholder="搜索文章...">
                        </div>
                        <button class="btn-primary" id="newArticleBtn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                            新建
                        </button>
                    </div>
                </div>
                <div class="filters-bar">
                    <div class="filter-group">
                        <select id="filterStatus" class="filter-select">
                            <option value="">全部状态</option>
                            <option value="true">已发布</option>
                            <option value="false">草稿</option>
                        </select>
                        <select id="filterCategory" class="filter-select">
                            <option value="">全部分类</option>
                        </select>
                        <select id="filterTag" class="filter-select">
                            <option value="">全部标签</option>
                        </select>
                    </div>
                    <div class="batch-actions hidden" id="batchActions">
                        <span class="batch-count">已选择 <span id="selectedCount">0</span> 篇</span>
                        <button class="btn-batch" id="batchPublish">批量发布</button>
                        <button class="btn-batch" id="batchUnpublish">取消发布</button>
                        <button class="btn-batch danger" id="batchDelete">删除</button>
                    </div>
                </div>
                <div class="articles-table">
                    <div class="table-header">
                        <div class="table-cell checkbox"><input type="checkbox" id="selectAll"></div>
                        <div class="table-cell title">标题</div>
                        <div class="table-cell category">分类</div>
                        <div class="table-cell tags">标签</div>
                        <div class="table-cell status">状态</div>
                        <div class="table-cell date">日期</div>
                        <div class="table-cell actions">操作</div>
                    </div>
                    <div class="table-body" id="articlesList">
                        <div class="loading">加载中...</div>
                    </div>
                </div>
                <div class="pagination" id="pagination"></div>
            </div>

            <div id="taxonomyPage" class="page hidden">
                <div class="page-header">
                    <div>
                        <h2>分类与标签</h2>
                        <p class="page-subtitle">管理系统分类和标签</p>
                    </div>
                </div>
                <div class="taxonomy-grid">
                    <div class="taxonomy-card">
                        <div class="taxonomy-header">
                            <h3>分类</h3>
                            <button class="btn-add" id="addCategoryBtn">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                                新增
                            </button>
                        </div>
                        <div class="taxonomy-list" id="categoriesList"></div>
                    </div>
                    <div class="taxonomy-card">
                        <div class="taxonomy-header">
                            <h3>标签</h3>
                            <button class="btn-add" id="addTagBtn">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                                新增
                            </button>
                        </div>
                        <div class="taxonomy-tags" id="tagsList"></div>
                    </div>
                </div>
            </div>

            <div id="settingsPage" class="page hidden">
                <div class="page-header">
                    <h2>系统设置</h2>
                    <p class="page-subtitle">配置博客基本信息</p>
                </div>
                <form id="settingsForm" class="settings-form">
                    <div class="settings-section">
                        <h3>基本信息</h3>
                        <div class="form-row">
                            <div class="form-group">
                                <label>博客名称</label>
                                <input type="text" name="blogName" value="静墨" required>
                            </div>
                            <div class="form-group">
                                <label>博客描述</label>
                                <input type="text" name="blogDescription" value="在纷繁中寻找宁静，在文字里雕刻时光">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>首页标语</label>
                            <input type="text" name="heroTitle" value="记录·思考·沉淀">
                        </div>
                        <div class="form-group">
                            <label>首页副标语</label>
                            <input type="text" name="heroSubtitle" value="在文字里雕刻时光">
                        </div>
                    </div>
                    <div class="settings-section">
                        <h3>SEO 设置</h3>
                        <div class="form-group">
                            <label>网站描述 (Meta Description)</label>
                            <textarea name="metaDescription" rows="3" placeholder="用于搜索引擎展示的描述，限制150字符"></textarea>
                        </div>
                        <div class="form-group">
                            <label>关键词 (Meta Keywords)</label>
                            <input type="text" name="metaKeywords" placeholder="用逗号分隔，如：博客,技术,随笔">
                        </div>
                        <div class="form-group">
                            <label>Google Analytics ID</label>
                            <input type="text" name="analyticsId" placeholder="G-XXXXXXXXXX">
                        </div>
                    </div>
                    <div class="settings-section">
                        <h3>社交链接</h3>
                        <div class="form-row">
                            <div class="form-group">
                                <label>GitHub</label>
                                <input type="url" name="socialGithub" placeholder="https://github.com/username">
                            </div>
                            <div class="form-group">
                                <label>Twitter/X</label>
                                <input type="url" name="socialTwitter" placeholder="https://twitter.com/username">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>邮箱</label>
                                <input type="email" name="socialEmail" placeholder="hello@example.com">
                            </div>
                            <div class="form-group">
                                <label>微信公众号</label>
                                <input type="text" name="socialWechat" placeholder="公众号名称">
                            </div>
                        </div>
                    </div>
                    <div class="settings-section">
                        <h3>显示设置</h3>
                        <div class="form-row">
                            <div class="form-group">
                                <label>首页每页文章数</label>
                                <input type="number" name="articlesPerPage" value="10" min="1" max="50">
                            </div>
                            <div class="form-group">
                                <label>文章列表排序</label>
                                <select name="articleOrder">
                                    <option value="desc">最新优先</option>
                                    <option value="asc">最旧优先</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group checkbox-group">
                            <label class="checkbox-label">
                                <input type="checkbox" name="showReadTime" checked>
                                <span class="checkbox-custom"></span>
                                显示阅读时间
                            </label>
                            <label class="checkbox-label">
                                <input type="checkbox" name="showViews" checked>
                                <span class="checkbox-custom"></span>
                                显示浏览量
                            </label>
                            <label class="checkbox-label">
                                <input type="checkbox" name="enableComments">
                                <span class="checkbox-custom"></span>
                                启用评论功能
                            </label>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn-secondary" id="resetSettingsBtn">重置默认</button>
                        <button type="submit" class="btn-primary">保存设置</button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <div class="modal" id="articleModal">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">新建文章</h3>
                <div class="modal-actions">
                    <span class="save-status" id="saveStatus"></span>
                    <button class="modal-close" id="closeModal">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                </div>
            </div>
            <form id="articleForm" class="article-form">
                <input type="hidden" id="articleId" name="articleId">
                <div class="form-section">
                    <div class="form-group title-input">
                        <input type="text" name="title" id="articleTitle" placeholder=" " required>
                        <label>文章标题</label>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>URL 别名</label>
                            <input type="text" name="slug" id="articleSlug" placeholder="auto-generate-from-title">
                            <span class="form-hint">留空则自动从标题生成</span>
                        </div>
                        <div class="form-group">
                            <label>分类</label>
                            <select name="category" id="articleCategory" required>
                                <option value="">选择分类</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="form-section">
                    <div class="form-group">
                        <label>摘要</label>
                        <textarea name="excerpt" id="articleExcerpt" rows="2" placeholder="简短描述文章内容..."></textarea>
                    </div>
                </div>
                <div class="form-section editor-section">
                    <div class="editor-toolbar">
                        <button type="button" class="toolbar-btn" data-action="bold" title="加粗"><strong>B</strong></button>
                        <button type="button" class="toolbar-btn" data-action="italic" title="斜体"><em>I</em></button>
                        <button type="button" class="toolbar-btn" data-action="heading" title="标题">H</button>
                        <button type="button" class="toolbar-btn" data-action="link" title="链接">🔗</button>
                        <button type="button" class="toolbar-btn" data-action="image" title="图片">🖼</button>
                        <button type="button" class="toolbar-btn" data-action="code" title="代码">&lt;/&gt;</button>
                        <button type="button" class="toolbar-btn" data-action="quote" title="引用">"</button>
                        <div class="toolbar-spacer"></div>
                        <button type="button" class="toolbar-btn preview-toggle" id="togglePreview">预览</button>
                        <button type="button" class="toolbar-btn" onclick="adminApp.previewArticle()" title="新窗口预览">🌐</button>
                    </div>
                    <div class="editor-container">
                        <textarea name="content" id="articleContent" rows="15" placeholder="开始写作..."></textarea>
                        <div class="editor-preview hidden" id="editorPreview"></div>
                    </div>
                </div>
                <div class="form-section">
                    <div class="form-row">
                        <div class="form-group">
                            <label>标签</label>
                            <div class="tags-input" id="tagsInput">
                                <div class="tags-selected" id="tagsSelected"></div>
                                <input type="text" id="tagInput" placeholder="输入标签后按回车添加">
                            </div>
                            <div class="tags-suggestions" id="tagsSuggestions"></div>
                        </div>
                        <div class="form-group">
                            <label>封面图片</label>
                            <input type="url" name="coverImage" id="articleCover" placeholder="https://...">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>阅读时间（分钟）</label>
                            <input type="number" name="readTime" id="articleReadTime" value="5" min="1">
                        </div>
                        <div class="form-group">
                            <label>发布状态</label>
                            <div class="status-toggle" id="statusToggle">
                                <button type="button" class="toggle-option active" data-value="draft" onclick="adminApp.setStatus('draft')">草稿</button>
                                <button type="button" class="toggle-option" data-value="published" onclick="adminApp.setStatus('published')">已发布</button>
                            </div>
                            <input type="hidden" name="published" id="articlePublished" value="false">
                        </div>
                        <div class="form-group checkbox-group">
                            <label class="checkbox-label">
                                <input type="checkbox" name="featured" id="articleFeatured">
                                <span class="checkbox-custom"></span>
                                精选
                            </label>
                        </div>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-secondary" id="cancelArticleBtn">取消</button>
                    <button type="button" class="btn-secondary" id="saveDraftBtn">保存草稿</button>
                    <button type="submit" class="btn-primary" id="saveBtn">发布</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal" id="taxonomyModal">
        <div class="modal-overlay"></div>
        <div class="modal-content modal-small">
            <div class="modal-header">
                <h3 id="taxonomyModalTitle">新增分类</h3>
                <button class="modal-close" id="closeTaxonomyModal">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <form id="taxonomyForm" class="taxonomy-form">
                <input type="hidden" id="taxonomyType" name="type">
                <input type="hidden" id="taxonomyId" name="id">
                <div class="form-group">
                    <label id="taxonomyLabel">名称</label>
                    <input type="text" id="taxonomyName" name="name" required>
                </div>
                <div class="form-group">
                    <label>Slug</label>
                    <input type="text" id="taxonomySlug" name="slug" placeholder="url-friendly-slug">
                </div>
                <div class="form-group">
                    <label>描述</label>
                    <textarea id="taxonomyDesc" name="description" rows="2"></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-secondary" id="cancelTaxonomyBtn">取消</button>
                    <button type="submit" class="btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <div class="toast" id="toast">
        <span class="toast-message"></span>
    </div>

</body>
